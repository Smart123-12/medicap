# Google Cloud Build configuration for MediCap
# Builds Docker image and deploys to Cloud Run

steps:
  # Step 1: Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/medicap:$COMMIT_SHA', '-t', 'gcr.io/$PROJECT_ID/medicap:latest', '.']
    id: 'build-image'

  # Step 2: Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/medicap:$COMMIT_SHA']
    id: 'push-image'
    waitFor: ['build-image']

  # Step 3: Push latest tag
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/medicap:latest']
    id: 'push-latest'
    waitFor: ['build-image']

  # Step 4: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'medicap'
      - '--image=gcr.io/$PROJECT_ID/medicap:$COMMIT_SHA'
      - '--platform=managed'
      - '--region=asia-south1'
      - '--allow-unauthenticated'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--min-instances=0'
      - '--max-instances=3'
      - '--port=8080'
      - '--set-env-vars=NODE_ENV=production,GOOGLE_CLOUD_PROJECT=$PROJECT_ID'
    id: 'deploy'
    waitFor: ['push-image']

# Build images
images:
  - 'gcr.io/$PROJECT_ID/medicap:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/medicap:latest'

# Build options
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

# Timeout
timeout: '600s'

# Substitutions
substitutions:
  _DEPLOY_REGION: 'asia-south1'
  _SERVICE_NAME: 'medicap'
